<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIRK AI | TITAN-ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #050507; --panel: #0f0f13; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f4f4f5; overflow: hidden; }
        
        /* Glassmorphism Effects */
        .glass { background: rgba(15, 15, 19, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar { background-color: var(--panel); border-right: 1px solid rgba(255,255,255,0.05); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar.closed { transform: translateX(-100%); }
        
        /* Chat Bubbles */
        .user-msg { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border-radius: 1.2rem 1.2rem 0.2rem 1.2rem; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .ai-msg { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.2rem 1.2rem 1.2rem 1.2rem; padding: 1.25rem; }
        
        /* Animations */
        @keyframes glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .glow-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: glow 2s infinite; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <div id="auth-overlay">
        <div class="w-full max-w-md p-8 glass rounded-3xl text-center space-y-6 mx-4">
            <div class="flex justify-center"><div class="p-4 bg-blue-600/20 rounded-2xl"><i data-lucide="shield-check" class="w-12 h-12 text-blue-500"></i></div></div>
            <h2 id="auth-title" class="text-3xl font-bold tracking-tight">Access Titan-Ultra</h2>
            <p class="text-gray-400 text-sm">Please login to sync your Core History.</p>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Enter Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition-all">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20">Initialize System</button>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 hidden z-[90]"></div>

    <aside id="sidebar" class="sidebar closed w-[280px] fixed md:relative h-full flex flex-col p-5">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">W</div>
                <span class="font-bold text-lg tracking-tighter italic">WIRK <span class="text-blue-500">AI</span></span>
            </div>
            <button onclick="newChat()" class="p-2 hover:bg-white/5 rounded-xl transition-colors"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2" id="history-list">
            </div>

        <div class="mt-auto pt-4 border-t border-white/5">
            <div class="flex items-center gap-3 p-3 glass rounded-2xl">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 flex items-center justify-center font-bold text-sm">U</div>
                <div class="flex-1 overflow-hidden">
                    <p id="display-name" class="text-sm font-semibold truncate">User Name</p>
                    <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">Ultra Active</p>
                </div>
                <button onclick="handleLogout()" class="text-gray-500 hover:text-red-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#07070a] relative">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 glass">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 hover:bg-white/5 rounded-lg"><i data-lucide="align-left"></i></button>
                <div class="hidden md:block h-4 w-[1px] bg-white/10"></div>
                <span class="text-xs font-medium text-gray-400 uppercase tracking-widest">Neural Network Status: <span class="text-blue-500">Optimal</span></span>
            </div>
            <div class="flex items-center gap-3">
                <div class="glow-dot"></div>
                <span class="text-[10px] font-bold text-gray-400">CORE ACTIVE</span>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 max-w-5xl mx-auto w-full">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center border border-blue-500/20 shadow-2xl shadow-blue-500/10">
                    <i data-lucide="bot" class="w-10 h-10 text-blue-500"></i>
                </div>
                <div class="space-y-2">
                    <h2 class="text-3xl font-bold tracking-tight">Welcome to WIRK AI</h2>
                    <p class="text-gray-500 max-w-sm mx-auto text-sm">Your all-in-one AI engine for coding, research, and creative intelligence.</p>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-8 w-full max-w-5xl mx-auto">
            <div id="file-preview" class="hidden px-4 py-2 glass rounded-t-2xl border-b-0 flex items-center justify-between text-xs text-blue-400">
                <span id="preview-filename" class="truncate max-w-[200px]"></span>
                <button onclick="clearFiles()" class="text-red-400 hover:text-red-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div class="input-wrapper p-2 flex items-end gap-2 shadow-2xl transition-all border-white/10 focus-within:border-blue-500/50">
                <button onclick="document.getElementById('file-input').click()" class="p-3 text-gray-400 hover:text-blue-500 hover:bg-white/5 rounded-2xl transition-all">
                    <i data-lucide="paperclip" class="w-5 h-5"></i>
                </button>
                <input type="file" id="file-input" class="hidden" onchange="handleFile(this)" accept="image/*, .pdf">
                
                <textarea id="user-input" rows="1" placeholder="Ask anything, Master..." 
                    class="bg-transparent flex-1 outline-none resize-none py-3 px-2 text-sm md:text-base max-h-48"
                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 text-white p-3.5 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/20">
                    <i data-lucide="arrow-up" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex justify-center gap-6 mt-4 opacity-30 text-[9px] font-bold tracking-[0.2em] text-gray-500">
                <span>INTERNET-READY</span>
                <span>WIKIPEDIA ACTIVE</span>
                <span>CODE-GOD MODE</span>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let selectedFileBase64 = null;
        let fileType = null;

        // --- AUTH LOGIC (Persistent & Name Aware) ---
        window.onload = () => {
            const savedUser = localStorage.getItem('titan_user');
            if(savedUser) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('display-name').innerText = savedUser;
                document.getElementById('user-avatar').innerText = savedUser.charAt(0).toUpperCase();
                loadHistory(); // Sirf is user ki history mangwayega
            }
        };

        function handleLogin() {
            const user = document.getElementById('auth-user').value.trim();
            if(user.length < 2) return alert("Please enter a valid name");
            localStorage.setItem('titan_user', user);
            location.reload();
        }

        function handleLogout() {
            localStorage.removeItem('titan_user');
            location.reload();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            fileType = file.type;
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileBase64 = e.target.result;
                document.getElementById('file-preview').classList.remove('hidden');
                document.getElementById('file-preview').classList.add('flex');
                document.getElementById('preview-filename').innerText = "📎 " + file.name;
            };
            reader.readAsDataURL(file);
        }

        function clearFiles() {
            selectedFileBase64 = null;
            document.getElementById('file-preview').classList.add('hidden');
            document.getElementById('file-input').value = '';
        }

        // --- UPDATED: Load history by Username ---
        async function loadHistory() {
            const currentUser = localStorage.getItem('titan_user');
            if(!currentUser) return;

            const res = await fetch(`/get_history?username=${encodeURIComponent(currentUser)}`);
            const data = await res.json();
            document.getElementById('history-list').innerHTML = data.map(chat => `
                <div onclick="openOldChat(${chat.id})" class="group flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl cursor-pointer transition-all border border-transparent hover:border-white/5">
                    <i data-lucide="message-square" class="w-4 h-4 text-gray-500 group-hover:text-blue-500"></i>
                    <span class="text-xs text-gray-400 group-hover:text-gray-200 truncate flex-1">${chat.user_msg}</span>
                </div>`).join('');
            lucide.createIcons();
        }

        async function openOldChat(id) {
            const chatBox = document.getElementById('chat-box');
            document.getElementById('welcome-screen').classList.add('hidden');
            chatBox.innerHTML = '<div class="h-full flex items-center justify-center text-blue-500 animate-pulse text-xs tracking-widest font-bold">RECALLING NEURAL DATA...</div>';
            
            if(window.innerWidth < 768) toggleSidebar();

            try {
                const res = await fetch(`/get_chat/${id}`);
                const data = await res.json();
                
                if(data.status === "success") {
                    chatBox.innerHTML = '';
                    data.history.forEach(msg => {
                        const isUser = msg.role === "user";
                        chatBox.innerHTML += `
                            <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300">
                                <div class="${isUser ? 'user-msg max-w-[85%] p-4 text-sm' : 'ai-msg max-w-[90%] w-full'}">
                                    ${!isUser ? `<div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-blue-400 tracking-[0.2em] uppercase"><i data-lucide="sparkles" class="w-3 h-3"></i> Titan Recall</div>` : ''}
                                    <div class="prose prose-invert text-sm md:text-base leading-relaxed text-gray-200">${marked.parse(msg.content)}</div>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) { chatBox.innerHTML = 'Error loading history.'; }
            chatBox.scrollTop = chatBox.scrollHeight;
            lucide.createIcons();
        }

        // --- UPDATED: Send message with Username ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const currentUser = localStorage.getItem('titan_user');
            const msg = input.value.trim();

            if (!msg && !selectedFileBase64) return;

            document.getElementById('welcome-screen').classList.add('hidden');
            chatBox.innerHTML += `
                <div class="flex justify-end animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="user-msg max-w-[85%] p-4 text-sm shadow-xl">${msg || "[File Sent]"}</div>
                </div>`;
            
            const loaderId = "loader-" + Date.now();
            chatBox.innerHTML += `
                <div id="${loaderId}" class="flex items-center gap-3 text-blue-500 text-[10px] font-bold tracking-widest uppercase">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    Titan is calculating...
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const payload = { 
                username: currentUser, // Backend ko bata raha hai kaun bol raha hai
                message: msg, 
                image: fileType?.includes('image') ? selectedFileBase64 : null, 
                pdf: fileType?.includes('pdf') ? selectedFileBase64 : null 
            };

            try {
                const res = await fetch('/ask', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(payload) 
                });
                const data = await res.json();
                document.getElementById(loaderId).remove();

                if (data.audio) new Audio("data:audio/mp3;base64," + data.audio).play();

                chatBox.innerHTML += `
                    <div class="flex justify-start animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="ai-msg max-w-[90%] w-full">
                            <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-blue-500 tracking-[0.2em] uppercase"><i data-lucide="zap" class="w-3 h-3"></i> Titan Intelligence</div>
                            <div class="prose prose-invert text-sm md:text-base leading-relaxed text-gray-200">${marked.parse(data.response)}</div>
                        </div>
                    </div>`;
                
                input.value = '';
                input.style.height = 'auto';
                clearFiles();
                loadHistory();
            } catch (e) { document.getElementById(loaderId).innerText = "TITAN OFFLINE."; }
            chatBox.scrollTop = chatBox.scrollHeight;
            lucide.createIcons();
        }

        function newChat() { location.reload(); }
    </script>
</body>
</html>
