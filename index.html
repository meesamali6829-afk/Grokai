<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WIRK AI | TITAN-ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #050507; --panel: #0f0f13; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f4f4f5; margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; display: flex; }
        .glass { background: rgba(15, 15, 19, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar { background-color: var(--panel); border-right: 1px solid rgba(255,255,255,0.08); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; width: 80%; max-width: 280px; position: fixed; top: 0; bottom: 0; left: 0; }
        .sidebar.closed { transform: translateX(-100%); }
        @media (min-width: 768px) { .sidebar { position: relative; transform: none !important; width: 280px; } .menu-btn { display: none; } }
        .user-msg { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border-radius: 1.2rem 1.2rem 0.2rem 1.2rem; word-wrap: break-word; max-width: 85%; align-self: flex-end; }
        .ai-msg { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 0.2rem 1.2rem 1.2rem 1.2rem; padding: 1rem; width: 100%; align-self: flex-start; }
        .mobile-header { padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
        .mobile-footer { padding-bottom: env(safe-area-inset-bottom); }
        @keyframes glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .glow-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: glow 2s infinite; }
        #chat-box::-webkit-scrollbar { width: 3px; }
        #chat-box::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-sm p-6 glass rounded-3xl text-center space-y-6">
            <div class="flex justify-center"><div class="p-4 bg-blue-600/20 rounded-2xl"><i data-lucide="shield-check" class="w-10 h-10 text-blue-500"></i></div></div>
            <h2 class="text-2xl font-bold">Titan-Ultra Login</h2>
            <div class="space-y-4">
                <input type="text" id="auth-user" placeholder="Enter Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 text-center">
                <button onclick="handleLogin()" class="w-full bg-blue-600 p-4 rounded-xl font-bold shadow-lg">Enter Neural Link</button>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/70 hidden z-[90]"></div>

    <aside id="sidebar" class="sidebar closed flex flex-col p-5">
        <div class="flex items-center justify-between mb-8 mt-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">W</div>
                <span class="font-bold text-lg tracking-tight italic">WIRK <span class="text-blue-500">AI</span></span>
            </div>
            <button onclick="newChat()" class="p-2 bg-white/5 rounded-xl hover:bg-blue-600/20"><i data-lucide="plus" class="w-5 h-5"></i></button>
        </div>
        
        <div class="flex-1 overflow-y-auto space-y-3" id="history-list">
            </div>

        <div class="mt-auto pt-4 border-t border-white/5">
            <div class="flex items-center gap-3 p-3 glass rounded-2xl">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-xs uppercase">U</div>
                <div class="flex-1 truncate">
                    <p id="display-name" class="text-xs font-semibold truncate text-gray-200">User</p>
                    <p class="text-[9px] text-green-400 font-bold uppercase tracking-widest">Titan Active</p>
                </div>
                <button onclick="handleLogout()" class="text-gray-500 hover:text-red-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#07070a] relative overflow-hidden">
        <header class="mobile-header w-full border-b border-white/5 flex items-center justify-between px-4 glass shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 hover:bg-white/5 rounded-lg menu-btn"><i data-lucide="menu"></i></button>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">Titan-Ultra</span>
                    <span class="text-[8px] text-gray-500 uppercase tracking-widest">Neural Link: Optimal</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="glow-dot"></div>
                <span class="text-[9px] font-bold text-gray-400">ONLINE</span>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6 w-full max-w-3xl mx-auto pt-6 flex flex-col">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-6 px-4">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center border border-blue-500/20 shadow-2xl">
                    <i data-lucide="zap" class="w-10 h-10 text-blue-500"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold tracking-tight">WIRK AI TITAN-ULTRA</h2>
                    <p class="text-gray-500 text-xs mt-2">Global Satellite Internet & Multimedia AI</p>
                </div>
                <div class="grid grid-cols-2 gap-2 w-full max-w-xs">
                    <div class="p-3 glass rounded-xl text-[10px] text-gray-400 border-blue-500/10 italic">"What's the news today?"</div>
                    <div class="p-3 glass rounded-xl text-[10px] text-gray-400 border-blue-500/10 italic">"Create a futuristic car image"</div>
                </div>
            </div>
        </div>

        <footer class="mobile-footer w-full p-3 md:p-6 shrink-0 bg-gradient-to-t from-[#050507] to-transparent">
            <div class="max-w-3xl mx-auto w-full">
                <div id="file-preview" class="hidden px-4 py-2 glass rounded-t-xl border-b-0 items-center justify-between text-[10px] text-blue-400">
                    <span id="preview-filename" class="truncate"></span>
                    <button onclick="clearFiles()" class="text-red-400 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
                
                <div class="glass p-2 flex items-end gap-2 shadow-2xl border border-white/10 rounded-2xl">
                    <button onclick="document.getElementById('file-input').click()" class="p-3 text-gray-400 active:scale-90 transition-transform">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>
                    <input type="file" id="file-input" class="hidden" onchange="handleFile(this)" accept="image/*">
                    
                    <textarea id="user-input" rows="1" placeholder="Type a message..." 
                        class="bg-transparent flex-1 outline-none resize-none py-3 px-1 text-sm max-h-[150px]"
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    
                    <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 text-white p-3 rounded-xl active:scale-90 transition-all shadow-lg shadow-blue-600/20">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-[8px] text-center text-gray-600 mt-2 tracking-widest uppercase">Titan-Ultra v4.0 | Satellite Link 2026</p>
            </div>
        </footer>
    </main>

    <script>
        lucide.createIcons();
        let selectedFileBase64 = null;
        let currentChatId = null; // To maintain context

        window.onload = () => {
            const savedUser = localStorage.getItem('titan_user');
            if(savedUser) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('display-name').innerText = savedUser;
                document.getElementById('user-avatar').innerText = savedUser.charAt(0).toUpperCase();
                loadHistory();
            }
        };

        function handleLogin() {
            const user = document.getElementById('auth-user').value.trim();
            if(user.length < 2) return;
            localStorage.setItem('titan_user', user);
            location.reload();
        }

        function handleLogout() { localStorage.removeItem('titan_user'); location.reload(); }
        
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileBase64 = e.target.result;
                document.getElementById('file-preview').classList.replace('hidden', 'flex');
                document.getElementById('preview-filename').innerText = "📎 Image Ready for Titan";
            };
            reader.readAsDataURL(file);
        }

        function clearFiles() {
            selectedFileBase64 = null;
            document.getElementById('file-preview').classList.replace('flex', 'hidden');
            document.getElementById('file-input').value = '';
        }

        // Sidebar Load (Unique Sessions Only)
        async function loadHistory() {
            const user = localStorage.getItem('titan_user');
            try {
                const res = await fetch('/get_history', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user })
                });
                const data = await res.json();
                document.getElementById('history-list').innerHTML = data.map(chat => `
                    <div onclick="openOldChat('${chat.chat_id}')" class="p-3 bg-white/5 rounded-xl cursor-pointer text-[10px] text-gray-400 truncate border border-transparent hover:border-blue-500/30 active:bg-blue-600/20 transition-all">
                        <i data-lucide="message-square" class="inline w-3 h-3 mr-2 text-blue-500"></i>${chat.title}
                    </div>`).join('');
                lucide.createIcons();
            } catch(e) {}
        }

        // FULL CONVERSATION LOAD LOGIC
        async function openOldChat(chatId) {
            const user = localStorage.getItem('titan_user');
            const chatBox = document.getElementById('chat-box');
            currentChatId = chatId; // Set global chat id for continuation
            
            document.getElementById('welcome-screen').classList.add('hidden');
            if(window.innerWidth < 768) toggleSidebar();
            
            chatBox.innerHTML = '<div class="h-full flex items-center justify-center text-blue-500 animate-pulse text-[10px] font-bold uppercase">Syncing Neural Memory...</div>';

            try {
                const res = await fetch('/load_chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: chatId, username: user })
                });
                const messages = await res.json();
                
                chatBox.innerHTML = ''; // Clear box for fresh load
                
                // LOOP THROUGH ALL MESSAGES
                messages.forEach(msg => {
                    // Render User Message
                    chatBox.innerHTML += `<div class="flex justify-end w-full mb-4"><div class="user-msg p-4 text-sm">${msg.user_msg}</div></div>`;
                    
                    // Render AI Message
                    chatBox.innerHTML += `
                        <div class="flex justify-start w-full mb-6">
                            <div class="ai-msg">
                                <div class="text-[9px] text-blue-500 font-bold uppercase mb-2">Satellite Archive</div>
                                <div class="prose prose-invert text-sm leading-relaxed text-gray-300">${marked.parse(msg.ai_msg)}</div>
                            </div>
                        </div>`;
                });
                
                chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
                lucide.createIcons();
            } catch(e) {
                chatBox.innerHTML = '<div class="text-red-500 text-center">Connection Lost.</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const user = localStorage.getItem('titan_user');
            const msg = input.value.trim();

            if (!msg && !selectedFileBase64) return;

            document.getElementById('welcome-screen').classList.add('hidden');
            chatBox.innerHTML += `<div class="flex justify-end w-full"><div class="user-msg p-3.5 text-sm">${msg || "Sent an Image"}</div></div>`;
            
            const loaderId = "loader-" + Date.now();
            chatBox.innerHTML += `<div id="${loaderId}" class="flex items-center gap-2 text-blue-500 text-[9px] font-bold uppercase tracking-widest animate-pulse mt-4"><div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div> Titan Searching Global Systems...</div>`;
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});

            try {
                const res = await fetch('/ask', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        username: user, 
                        message: msg, 
                        chat_id: currentChatId, // Send current ID to backend for continuity
                        image: selectedFileBase64
                    }) 
                });
                const data = await res.json();
                document.getElementById(loaderId).remove();
                
                // Update current chat ID if it's a new session
                if(!currentChatId) currentChatId = data.chat_id;

                if (data.audio) { 
                    const audio = new Audio("data:audio/mp3;base64," + data.audio);
                    audio.play();
                }

                let html = `<div class="flex justify-start w-full mt-4"><div class="ai-msg">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-[9px] text-blue-500 font-bold uppercase"><i data-lucide="globe" class="inline w-2.5 h-2.5 mr-1"></i> Titan Ultra Output</div>
                    </div>
                    <div class="prose prose-invert text-sm leading-relaxed text-gray-200">${marked.parse(data.response)}</div>`;
                
                if(data.generated_image) {
                    html += `<div class="mt-3 border border-white/10 rounded-lg overflow-hidden shadow-2xl">
                        <img src="data:image/png;base64,${data.generated_image}" class="w-full h-auto">
                    </div>`;
                }
                html += `</div></div>`;
                chatBox.innerHTML += html;
                
                input.value = '';
                input.style.height = 'auto';
                clearFiles();
                loadHistory(); // Refresh sidebar titles
            } catch (e) { 
                document.getElementById(loaderId).innerHTML = "<span class='text-red-500'>Satellite Link Error.</span>"; 
            }
            chatBox.scrollTo({top: chatBox.scrollHeight, behavior: 'smooth'});
            lucide.createIcons();
        }

        function newChat() {
            currentChatId = null;
            document.getElementById('chat-box').innerHTML = '';
            document.getElementById('welcome-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
